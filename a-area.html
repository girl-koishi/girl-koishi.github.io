<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万达商场监控中心 - 发电厂温度控制系统</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#93c5fd',
                        accent: '#10b981',
                        warning: '#f97316',
                        dark: '#0f172a',
                        'dark-light': '#1e293b',
                        'light-text': '#e2e8f0'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'flow': 'flow 2s linear infinite',
                    },
                    keyframes: {
                        flow: {
                            '0%': { strokeDashoffset: '24' },
                            '100%': { strokeDashoffset: '0' }
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
            .border-glow { box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
            .bg-grid {
                background-image: 
                    linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
                background-size: 20px 20px;
            }
            .card-hover { transition: all 0.3s ease; }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            }
        }
    </style>
</head>
<body class="bg-dark text-light-text min-h-screen flex flex-col">
    <!-- 顶部区域 -->
    <header class="bg-dark-light border-b border-primary/30 py-4 px-6">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center mb-4 md:mb-0">
                <a href="index.html" class="flex items-center">
                    <i class="fa fa-bolt text-warning text-3xl mr-3"></i>
                    <h1 class="text-3xl font-bold text-primary text-shadow">发电厂温度控制系统</h1>
                </a>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center bg-dark-light/50 px-4 py-2 rounded-lg border border-primary/30 border-glow">
                    <i class="fa fa-clock-o text-secondary mr-2"></i>
                    <span id="current-time" class="text-xl font-mono"></span>
                </div>
                <a href="index.html" class="bg-primary hover:bg-primary/80 text-white px-4 py-2 rounded-lg flex items-center transition-colors duration-300">
                    <i class="fa fa-home mr-2"></i>
                    返回首页
                </a>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="flex-grow container mx-auto p-6 bg-grid">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-secondary mb-2">万达商场监控中心</h2>
            <p class="text-light-text/70">大型商圈温度与制冷系统实时监控</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 万达商场温度监控 -->
            <div class="bg-dark-light rounded-lg border border-secondary/30 p-6 border-glow card-hover">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-secondary">万达商场温度监控</h3>
                    <div class="flex items-center space-x-2">
                        <span class="text-sm text-light-text/70 mr-2">目标温度:</span>
                        <span id="displayTargetTempA" class="text-lg font-bold text-accent">{{baseData.wanda.currentTemp}}°C</span>
                        <!-- 目标温度输入框 -->
                        <input type="number" id="targetTempInputA" placeholder="输入温度" step="0.1" min="20" max="30"
                               class="bg-dark-light border border-primary/50 rounded px-3 py-1 text-light-text w-20 text-center">
                        <button id="setTargetTempBtnA" 
                                class="bg-primary hover:bg-primary/80 text-white px-2 py-1 rounded-lg text-sm transition-colors duration-300">
                            确认
                        </button>
                    </div>
                </div>
                
                <!-- 温度点控制面板 -->
                <div class="mb-6 bg-dark p-4 rounded-lg border border-primary/20">
                    <h4 class="text-lg font-semibold mb-3 text-secondary">温度数据管理</h4>
                    
                    <!-- 自动获取天气数据按钮 -->
                    <div class="mb-4">
                        <button id="getMangshiWeatherBtn" 
                                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center transition-colors duration-300">
                            <i class="fa fa-cloud-download mr-2"></i> 自动获取芒市实时天气
                        </button>
                    
                    <!-- 手动设置温度点 -->
                    <div class="flex flex-wrap gap-3 items-center mb-3">
                        <label class="text-light-text/90">时间 (HH:MM):</label>
                        <input type="text" id="tempTimeInputA" placeholder="例如: 14:30" 
                               class="bg-dark-light border border-primary/50 rounded px-3 py-2 text-light-text w-24">
                        <label class="text-light-text/90">温度 (°C):</label>
                        <input type="number" id="tempValueInputA" placeholder="例如: 24.5" step="0.1"
                               class="bg-dark-light border border-primary/50 rounded px-3 py-2 text-light-text w-20">
                        <button id="addTempPointBtnA" 
                                class="bg-accent hover:bg-accent/80 text-white px-4 py-2 rounded-lg flex items-center transition-colors duration-300">
                            <i class="fa fa-plus mr-2"></i> 添加温度点
                        </button>
                        <button id="resetTempChartBtnA" 
                                class="bg-warning hover:bg-warning/80 text-white px-4 py-2 rounded-lg flex items-center transition-colors duration-300">
                            <i class="fa fa-refresh mr-2"></i> 重置图表
                        </button>
                    </div>
                    <div class="mt-3 text-sm text-light-text/80">
                        已添加温度点: <span id="pointCountA">3</span> 个
                    </div>
                </div>
                
                <div class="h-80">
                    <canvas id="temperatureChartA"></canvas>
                </div>
                <div class="mt-6 flex justify-center">
                    <a href="analysis.html" class="bg-accent hover:bg-accent/80 text-white px-6 py-2 rounded-lg flex items-center transition-colors duration-300">
                        <i class="fa fa-line-chart mr-2"></i>
                        分析温度
                    </a>
                </div>
            </div>

            <!-- 万达商场制冷功率（同步温度点） -->
            <div class="bg-dark-light rounded-lg border border-secondary/30 p-6 border-glow card-hover">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-secondary">万达商场制冷功率</h3>
                    <div class="flex items-center">
                        <span class="text-sm text-light-text/70 mr-2">基准功率:</span>
                        <span class="text-lg font-bold text-primary">1.6 万kW</span>
                    </div>
                </div>
                <div class="h-80">
                    <canvas id="powerChartA"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部区域 -->
    <footer class="bg-dark-light border-t border-primary/30 py-4 px-6">
        <div class="container mx-auto text-center text-sm text-light-text/70">
            <p>&copy; 2025 发电厂温度控制系统 | 版权所有</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // 更新当前时间
        function updateCurrentTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}`;
        }
        updateCurrentTime();
        setInterval(updateCurrentTime, 60000);

        // 万达商场核心数据
        let tempPointsA = [
            { time: '14:00', temp: 24.5 },
            { time: '14:10', temp: 24.7 },
            { time: '14:20', temp: 24.6 }
        ];
        let targetTempA = 24.0; 
        document.getElementById('displayTargetTempA').textContent = `${targetTempA.toFixed(1)}°C`;
        document.getElementById('targetTempInputA').value = targetTempA;
        document.getElementById('pointCountA').textContent = tempPointsA.length;

        // 生成温度
        function getTempDataA() {
            tempPointsA.sort((a, b) => a.time.split(':').join('') - b.time.split(':').join(''));
            return {
                labels: tempPointsA.map(p => p.time),
                target: tempPointsA.map(() => targetTempA), 
                actual: tempPointsA.map(p => p.temp)
            };
        }

        // 生成万达商场功率数据（与温度强正相关，单位：万kW）
        function getPowerDataA(labels) {
            return labels.map((_, i) => {
                const base = 1.6; // 基准功率1.6万kW
                const tempDiff = tempPointsA[i].temp - targetTempA; // 温度差值
                
                // 温度差与功率的强正相关关系：Tup Pup
                // 系数0.15控制功率随温度变化的敏感度（大幅提高）
                const tempRelatedPower = base + (tempDiff * 0.15);
                
                // 添加小波动使曲线更自然
                const fluctuation = (Math.random() - 0.5) * 0.02;
                
                // 确保功率在合理范围内（扩大范围以适应更大的变化）
                const finalPower = Math.max(1.4, Math.min(1.8, tempRelatedPower + fluctuation));
                
                return finalPower.toFixed(2);
            });
        }

        // 初始化万达商场温度图表
        const tempCtxA = document.getElementById('temperatureChartA').getContext('2d');
        const tempDataA = getTempDataA();
        const tempChartA = new Chart(tempCtxA, {
            type: 'line',
            data: {
                labels: tempDataA.labels,
                datasets: [
                    {
                        label: '目标温度',
                        data: tempDataA.target,
                        borderColor: 'rgba(16, 185, 129, 1)',
                        borderDash: [5, 5],
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.1,
                        fill: false
                    },
                    {
                        label: '实际温度',
                        data: tempDataA.actual,
                        borderColor: 'rgba(249, 115, 22, 1)',
                        borderWidth: 2,
                        pointRadius: 3,
                        pointBackgroundColor: 'rgba(249, 115, 22, 1)',
                        tension: 0.5,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        grid: { color: 'rgba(59, 130, 246, 0.1)' }, 
                        ticks: { color: 'rgba(226, 232, 240, 0.7)', maxRotation: 45, autoSkip: false } 
                    },
                    y: { 
                        grid: { color: 'rgba(59, 130, 246, 0.1)' }, 
                        ticks: { color: 'rgba(226, 232, 240, 0.7)', callback: v => v + ' °C' },
                        suggestedMin: 23,
                        suggestedMax: 26
                    }
                },
                plugins: {
                    legend: { labels: { color: 'rgba(226, 232, 240, 0.9)' } },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        borderColor: 'rgba(59, 130, 246, 0.5)',
                        borderWidth: 1
                    }
                }
            }
        });

        // 初始化万达商场功率图表
        const powerCtxA = document.getElementById('powerChartA').getContext('2d');
        const powerChartA = new Chart(powerCtxA, {
            type: 'line',
            data: {
                labels: tempDataA.labels,
                datasets: [{
                    label: '制冷功率',
                    data: getPowerDataA(tempDataA.labels),
                    borderColor: 'rgba(59, 130, 246, 1)',
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    borderWidth: 2,
                    pointRadius: 2,
                    pointBackgroundColor: 'rgba(59, 130, 246, 1)',
                    tension: 0.5,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        grid: { color: 'rgba(59, 130, 246, 0.1)' }, 
                        ticks: { color: 'rgba(226, 232, 240, 0.7)', maxRotation: 45, autoSkip: false } 
                    },
                    y: { 
                        grid: { color: 'rgba(59, 130, 246, 0.1)' }, 
                        ticks: { 
                            color: 'rgba(226, 232, 240, 0.7)', 
                            callback: v => v + ' 万kW',
                            stepSize: 0.1 // 分度值0.1万kW
                        },
                        suggestedMin: 1.5, // 适配1.6万kW基准的范围
                        suggestedMax: 1.7  // 上下留0.1万kW余量
                    }
                },
                plugins: {
                    legend: { labels: { color: 'rgba(226, 232, 240, 0.9)' } },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        borderColor: 'rgba(59, 130, 246, 0.5)',
                        borderWidth: 1,
                        callbacks: {
                            label: function(context) {
                                return `制冷功率: ${context.raw} 万kW`;
                            }
                        }
                    }
                }
            }
        });

        // 新增：万达商场设置目标温度
        document.getElementById('setTargetTempBtnA').addEventListener('click', function() {
            const newTemp = parseFloat(document.getElementById('targetTempInputA').value);
            
            // 验证输入
            if (isNaN(newTemp) || newTemp < 20 || newTemp > 30) {
                alert('请输入20-30之间的有效温度值');
                return;
            }
            
            // 更新目标温度
            targetTempA = newTemp;
            document.getElementById('displayTargetTempA').textContent = `${targetTempA.toFixed(1)}°C`;
            
            // 更新温度图表中的目标温度线
            const newTempData = getTempDataA();
            tempChartA.data.datasets[0].data = newTempData.target;
            tempChartA.update();
            
            // 更新功率图表（因为功率和温度差值相关）
            powerChartA.data.datasets[0].data = getPowerDataA(newTempData.labels);
            powerChartA.update();
            
            // 清空输入框
            document.getElementById('targetTempInputA').value = '';
        });

        // 自动获取芒市天气数据（下午4点到5点）
        async function getMangshiWeather() {
            const mangshiLat = 24.4333; // 芒市纬度
            const mangshiLon = 98.5000; // 芒市经度
            
            try {
                // 显示加载状态
                const btn = document.getElementById('getMangshiWeatherBtn');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> 获取中...';
                
                // 获取当前日期
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                
                // 计算下午4点到5点的时间点（每15分钟一个点，共7个点）
                const targetTimes = [
                    new Date(today.getTime() + 16 * 60 * 60 * 1000),          // 16:00
                    new Date(today.getTime() + 16 * 60 * 60 * 1000 + 15 * 60 * 1000), // 16:15
                    new Date(today.getTime() + 16 * 60 * 60 * 1000 + 30 * 60 * 1000), // 16:30
                    new Date(today.getTime() + 16 * 60 * 60 * 1000 + 45 * 60 * 1000), // 16:45
                    new Date(today.getTime() + 17 * 60 * 60 * 1000),          // 17:00
                    new Date(today.getTime() + 17 * 60 * 60 * 1000 + 15 * 60 * 1000), // 17:15
                    new Date(today.getTime() + 17 * 60 * 60 * 1000 + 30 * 60 * 1000)  // 17:30
                ];
                
                // 获取天气预报数据（请求2天的数据以确保覆盖今天）
                const forecastUrl = `https://api.open-meteo.com/v1/forecast?latitude=${mangshiLat}&longitude=${mangshiLon}&hourly=temperature_2m&forecast_days=2&timezone=Asia/Shanghai`;
                const forecastResponse = await fetch(forecastUrl);
                const forecastData = await forecastResponse.json();
                
                // 处理数据
                const weatherData = [];
                
                // 为每个目标时间点查找对应的温度数据
                targetTimes.forEach(targetTime => {
                    // 查找对应的预报数据
                    const forecastIndex = forecastData.hourly.time.findIndex(t => {
                        const tDate = new Date(t);
                        return tDate.getHours() === targetTime.getHours() && 
                               tDate.getDate() === targetTime.getDate() &&
                               tDate.getMonth() === targetTime.getMonth() &&
                               tDate.getFullYear() === targetTime.getFullYear();
                    });
                    
                    if (forecastIndex !== -1) {
                        const hour = targetTime.getHours().toString().padStart(2, '0');
                        const minute = targetTime.getMinutes().toString().padStart(2, '0');
                        weatherData.push({
                            time: `${hour}:${minute}`,
                            temp: parseFloat(forecastData.hourly.temperature_2m[forecastIndex].toFixed(1))
                        });
                    }
                });
                
                // 如果没有找到足够的数据，使用模拟数据
                if (weatherData.length < 6) {
                    console.log('未找到足够的预报数据，使用模拟数据');
                    const baseTemp = 24.5;
                    targetTimes.forEach((targetTime, index) => {
                        const hour = targetTime.getHours().toString().padStart(2, '0');
                        const minute = targetTime.getMinutes().toString().padStart(2, '0');
                        // 生成一些温度变化
                        const tempVariation = Math.sin(index * Math.PI / 6) * 0.8;
                        weatherData.push({
                            time: `${hour}:${minute}`,
                            temp: parseFloat((baseTemp + tempVariation).toFixed(1))
                        });
                    });
                }
                
                // 确保只有7个数据点
                tempPointsA = weatherData.slice(0, 7);
                document.getElementById('pointCountA').textContent = tempPointsA.length;
                
                // 更新图表
                const newData = getTempDataA();
                tempChartA.data.labels = newData.labels;
                tempChartA.data.datasets[0].data = newData.target;
                tempChartA.data.datasets[1].data = newData.actual;
                tempChartA.update();
                
                powerChartA.data.labels = newData.labels;
                powerChartA.data.datasets[0].data = getPowerDataA(newData.labels);
                powerChartA.update();
                
                // 显示成功提示
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-4 right-4 bg-accent text-white px-6 py-3 rounded-lg shadow-lg z-50 flex items-center';
                toast.innerHTML = `<i class="fa fa-check-circle mr-2"></i> 成功获取芒市下午4点到5点的温度数据`;
                document.body.appendChild(toast);
                
                // 3秒后移除提示
                setTimeout(() => {
                    toast.remove();
                }, 3000);
                
            } catch (error) {
                console.error('获取天气数据失败:', error);
                alert('获取天气数据失败，请稍后重试。错误信息：' + error.message);
            } finally {
                // 恢复按钮状态
                const btn = document.getElementById('getMangshiWeatherBtn');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-cloud-download mr-2"></i> 自动获取芒市实时天气';
            }
        }

        // 绑定自动获取天气按钮事件
        document.getElementById('getMangshiWeatherBtn').addEventListener('click', getMangshiWeather);

        // 万达商场添加温度点
        document.getElementById('addTempPointBtnA').addEventListener('click', function() {
            const time = document.getElementById('tempTimeInputA').value.trim();
            const temp = parseFloat(document.getElementById('tempValueInputA').value);
            
            // 验证
            if (!/^\d{2}:\d{2}$/.test(time)) { alert('时间格式错误（如：14:30）'); return; }
            if (isNaN(temp) || temp < 20 || temp > 30) { alert('温度需在20-30°C之间'); return; }
            if (tempPointsA.some(p => p.time === time)) { alert('该时间点已存在'); return; }
            
            // 添加数据
            tempPointsA.push({ time, temp });
            document.getElementById('pointCountA').textContent = tempPointsA.length;
            
            // 更新图表
            const newData = getTempDataA();
            tempChartA.data.labels = newData.labels;
            tempChartA.data.datasets[0].data = newData.target;
            tempChartA.data.datasets[1].data = newData.actual;
            tempChartA.update();
            
            powerChartA.data.labels = newData.labels;
            powerChartA.data.datasets[0].data = getPowerDataA(newData.labels);
            powerChartA.update();
            
            // 清空输入
            document.getElementById('tempTimeInputA').value = '';
            document.getElementById('tempValueInputA').value = '';
        });

        // 万达商场重置图表
        document.getElementById('resetTempChartBtnA').addEventListener('click', function() {
            tempPointsA = [
                { time: '14:00', temp: 24.5 },
                { time: '14:10', temp: 24.7 },
                { time: '14:20', temp: 24.6 }
            ];
            // 重置目标温度为默认值
            targetTempA = 24.0;
            document.getElementById('displayTargetTempA').textContent = `${targetTempA.toFixed(1)}°C`;
            document.getElementById('targetTempInputA').value = targetTempA;
            
            document.getElementById('pointCountA').textContent = tempPointsA.length;
            
            const newData = getTempDataA();
            tempChartA.data.labels = newData.labels;
            tempChartA.data.datasets[0].data = newData.target;
            tempChartA.data.datasets[1].data = newData.actual;
            tempChartA.update();
            
            powerChartA.data.labels = newData.labels;
            powerChartA.data.datasets[0].data = getPowerDataA(newData.labels);
            powerChartA.update();
        });
    </script>
</body>
</html>

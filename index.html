<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于温控负荷的能源优化管理系统</title>
    <!-- 1. 库引入与配置 -->
    <script type="importmap">
    {
        "imports": {
            "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
        }
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',
                        accent: '#38bdf8',
                        dark: '#0f172a',
                        'dark-blue': '#0f172a',
                        'grid-color': 'rgba(56, 189, 248, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        .grid-bg {
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(56, 189, 248, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(56, 189, 248, 0.1) 1px, transparent 1px);
        }
        .power-line { stroke-dasharray: 10; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -20; } }
        .city-node { cursor: pointer; transition: all 0.1s ease; pointer-events: all; }
        .city-label { font-size: 14px; font-weight: bold; fill: white; text-anchor: middle; text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .map-contour path { opacity: 0.8; }
    </style>
</head>
<body class="bg-dark-blue text-white min-h-screen overflow-hidden" id="app">
    <!-- 背景层 (增加了穿透属性) -->
    <div id="particles-js" class="fixed inset-0 z-0 pointer-events-none"></div>
    <div class="fixed inset-0 z-0 grid-bg opacity-50 pointer-events-none"></div>

    <div class="relative z-10 flex flex-col h-screen">
        <!-- 顶部导航 -->
        <header class="bg-dark/80 backdrop-blur-md border-b border-accent/30 p-4 flex justify-between items-center">
            <div class="text-primary text-2xl font-bold"><i class="fa fa-bolt mr-2"></i>能源优化管理系统</div>
            <div class="text-sm text-gray-400" id="current-date-time">加载中...</div>
        </header>

        <main class="flex-1 relative overflow-hidden bg-[#0f172a]">
            <!-- 地图容器 -->
            <div class="absolute inset-0 flex items-center justify-center">
                <svg width="1200" height="900" viewBox="0 0 1200 900" class="max-w-[95vw] max-h-[90vh] transform translate-x-20 scale-135">
                    
                    <!-- [完全保留] 最初代码的地图轮廓 -->
                    <g class="map-contour">
                        <path d="M260,230 C310,185 360,165 410,175 C460,185 510,205 560,225 C610,245 650,285 680,335 C710,385 730,445 710,485 C690,525 640,545 590,535 C540,525 490,505 440,515 C390,525 340,545 300,535 C260,525 230,495 210,455 C190,415 200,365 210,325 C220,285 230,255 260,230 Z" fill="rgba(34, 197, 94, 0.15)" stroke="#22c55e" stroke-width="2" />
                        <path d="M280,250 C320,220 350,205 390,215 C430,225 460,245 490,265 C520,285 550,315 580,355 C610,395 620,435 600,465 C580,495 540,515 500,505 C460,495 420,485 380,495 C340,505 300,525 270,515 C240,505 220,485 210,455 C200,425 210,395 220,365 C230,335 240,305 260,275 Z" fill="rgba(56, 189, 248, 0.08)" stroke="#38bdf8" stroke-width="1" />
                    </g>
                    
                    <!-- [完全保留] 最初代码的所有连线数据 -->
                    <g class="power-lines">
                        <path d="M250,500 L500,300" stroke="#38bdf8" stroke-width="4" class="power-line" />
                        <path d="M250,500 L650,320" stroke="#38bdf8" stroke-width="4" class="power-line" />
                        <path d="M500,300 L650,320" stroke="#f97316" stroke-width="3" class="power-line" />
                        <path d="M500,300 L420,240" stroke="#f97316" stroke-width="3" class="power-line" />
                        <path d="M500,300 L550,270" stroke="#f97316" stroke-width="3" class="power-line" />
                        <path d="M650,320 L680,400" stroke="#f97316" stroke-width="3" class="power-line" />
                        <path d="M650,320 L580,380" stroke="#f97316" stroke-width="3" class="power-line" />
                        <path d="M250,500 L350,450" stroke="#22c55e" stroke-width="2" class="power-line" />
                        <path d="M250,500 L300,380" stroke="#22c55e" stroke-width="2" class="power-line" />
                        <path d="M500,300 L450,350" stroke="#22c55e" stroke-width="2" class="power-line" />
                        <path d="M500,300 L380,320" stroke="#22c55e" stroke-width="2" class="power-line" />
                        <path d="M650,320 L620,420" stroke="#22c55e" stroke-width="2" class="power-line" />
                        <path d="M650,320 L600,320" stroke="#22c55e" stroke-width="2" class="power-line" />
                        <path d="M500,300 L480,430" stroke="#22c55e" stroke-width="2" class="power-line" />
                        <path d="M650,320 L450,350" stroke="#22c55e" stroke-width="2" class="power-line" />
                        <!-- 密集网格线部分 -->
                        <path d="M200,450 L500,300" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                        <path d="M300,550 L650,320" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                        <path d="M250,500 L450,350" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                        <path d="M420,240 L320,280" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                        <path d="M550,270 L600,320" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                        <path d="M620,420 L520,400" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                        <path d="M350,450 L480,430" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                        <path d="M300,380 L380,320" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                        <path d="M450,350 L520,400" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                        <path d="M580,380 L680,400" stroke="#38bdf8" stroke-width="1" class="power-line" opacity="0.6" />
                    </g>
                    
                    <!-- 交互节点 (绑定 Vue 函数) -->
                    <g class="city-node" @click.stop="goTo('power-plant.html')" transform="translate(250, 500)">
                        <circle r="18" fill="#8b5cf6" /><circle r="10" fill="#ffffff" />
                        <text y="50" class="city-label">发电厂</text>
                    </g>
                    <g class="city-node" @click.stop="toggleMenu('changchun-menu', $event)" transform="translate(500, 300)">
                        <circle r="15" fill="#0ea5e9" /><circle r="8" fill="#ffffff" />
                        <text y="45" class="city-label">万达商场</text>
                    </g>
                    <g class="city-node" @click.stop="toggleMenu('jilin-menu', $event)" transform="translate(650, 320)">
                        <circle r="15" fill="#f97316" /><circle r="8" fill="#ffffff" />
                        <text y="45" class="city-label">幸福小区</text>
                    </g>

                    <!-- 静态装饰节点 (保持位置不变) -->
                    <g transform="translate(420, 240)"><circle r="8" fill="#6366f1" /><text y="25" class="city-label" font-size="10">市政府</text></g>
                    <g transform="translate(550, 270)"><circle r="8" fill="#ec4899" /><text y="25" class="city-label" font-size="10">百货大楼</text></g>
                </svg>
            </div>

            <!-- 数据面板 -->
            <div class="absolute top-4 left-4 bg-dark/80 backdrop-blur-md border border-accent/30 rounded-lg p-3 w-48">
                <h3 class="text-accent font-bold mb-2 text-sm">实时数据监控</h3>
                <div class="space-y-2 text-xs">
                    <div class="flex justify-between"><span>电网总负载:</span><span class="text-green-400">{{ baseData.grid.totalLoad }}%</span></div>
                    <div class="flex justify-between"><span>万达温度:</span><span class="text-yellow-400">{{ baseData.wanda.currentTemp }}°C</span></div>
                    <div class="flex justify-between"><span>小区负载:</span><span class="text-orange-400">{{ baseData.community.loadRate }}%</span></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 菜单 (万达) -->
    <div id="changchun-menu" class="hidden fixed z-50 bg-dark/95 border border-primary rounded-lg p-4 w-48 shadow-2xl">
        <h4 class="text-primary font-bold mb-2">万达商场控制</h4>
        <button @click="goTo('a-area.html')" class="w-full text-left px-3 py-2 rounded hover:bg-primary/20 flex items-center text-sm mb-1"><i class="fa fa-area-chart mr-2"></i>温度分析</button>
        <button @click="goTo('a-cooling-analysis.html')" class="w-full text-left px-3 py-2 rounded hover:bg-primary/20 flex items-center text-sm"><i class="fa fa-snowflake-o mr-2"></i>制冷分析</button>
    </div>

    <!-- 菜单 (小区) -->
    <div id="jilin-menu" class="hidden fixed z-50 bg-dark/95 border border-orange-500 rounded-lg p-4 w-48 shadow-2xl">
        <h4 class="text-orange-500 font-bold mb-2">幸福小区控制</h4>
        <button @click="goTo('b-area.html')" class="w-full text-left px-3 py-2 rounded hover:bg-orange-500/20 flex items-center text-sm mb-1"><i class="fa fa-area-chart mr-2"></i>温度分析</button>
        <button @click="goTo('b-cooling-analysis.html')" class="w-full text-left px-3 py-2 rounded hover:bg-orange-500/20 flex items-center text-sm"><i class="fa fa-snowflake-o mr-2"></i>制冷分析</button>
    </div>

    <!-- 4. 核心逻辑 -->
    <script type="module">
        import { createApp, onMounted, ref } from 'vue';
        import { baseData } from './systemData.js'; // 确保文件名拼写正确

        createApp({
            setup() {
                const goTo = (url) => { window.location.href = url; };

                const toggleMenu = (id, event) => {
                    document.querySelectorAll('[id$="-menu"]').forEach(m => m.classList.add('hidden'));
                    const menu = document.getElementById(id);
                    if (menu && event) {
                        menu.classList.remove('hidden');
                        menu.style.left = `${event.clientX}px`;
                        menu.style.top = `${event.clientY}px`;
                    }
                };

                onMounted(() => {
                    // 粒子背景
                    if (window.particlesJS) {
                        particlesJS('particles-js', {
                            particles: { number: { value: 60 }, color: { value: '#38bdf8' }, line_linked: { opacity: 0.2 }, move: { speed: 1 } }
                        });
                    }

                    // 实时时间 (修正 Date)
                    const updateTime = () => {
                        const el = document.getElementById('current-date-time');
                        if (el) el.textContent = new Date().toLocaleString();
                    };
                    setInterval(updateTime, 1000);

                    // 点击空白关闭菜单
                    window.addEventListener('click', () => {
                        document.querySelectorAll('[id$="-menu"]').forEach(m => m.classList.add('hidden'));
                    });
                });

                return { baseData, goTo, toggleMenu };
            }
        }).mount('#app');
    </script>
</body>
</html>
